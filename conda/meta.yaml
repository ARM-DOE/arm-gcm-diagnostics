package:
    name: arm_diags
    version: 4.0.0

source:
    git_url: git@github.com:ARM-DOE/arm-gcm-diagnostics.git

build:
    number: 0
    script: python -m pip install --no-deps --ignore-installed .
    entry_points:
      - arm-diags = arm_diags.cli:main
    noarch: python

requirements:
  build:
    - python >=3.6
    - pip
    - setuptools

  host:
    - python >=3.6
    - pip
    - setuptools

  run:
    - python >=3.6
    - cdms2 >=3.1.5
    - cdutil >=8.2.1
    - genutil >=8.2.1
    - numpy >=1.19.0
    - matplotlib >=3.3.0

about:
    home: https://github.com/ARM-DOE/arm-gcm-diagnostics/
    license: LLNL and ARM
    summary: ARM Diagnostics - A package for earth system model evaluation using ARM data
    description: |
      ARM Diagnostics is a Python-based tool for evaluating earth system model performance
      using observational data from the Atmospheric Radiation Measurement (ARM) program.
    doc_url: https://github.com/ARM-DOE/arm-gcm-diagnostics
    dev_url: https://github.com/ARM-DOE/arm-gcm-diagnostics

